name: Documentation issue
description: Report a typo, broken link, missing step, or confusing documentation.
title: "[Docs] "
labels:
  - documentation
body:
  - type: input
    id: page
    attributes:
      label: Page URL
      description: Link to the affected documentation page.
      placeholder: https://docs.6mm.com/...
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong?
      description: Describe the typo, broken link, missing detail, or confusing section.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
      description: Optional wording or correction.
    validations:
      required: false
